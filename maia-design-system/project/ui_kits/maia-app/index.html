<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maia — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: #050505; color: var(--fg-1); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  #root { height: 100vh; width: 100vw; position: relative; overflow: hidden; }

  /* Aurora background */
  .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; background: #050505; }
  .aurora::before, .aurora::after { content:""; position:absolute; border-radius:50%; filter: blur(120px); opacity: 0.22; }
  .aurora::before { width: 600px; height: 600px; background: #8B5CF6; top: -150px; left: -100px; animation: drift1 28s ease-in-out infinite alternate; }
  .aurora::after { width: 500px; height: 500px; background: #0EA5E9; bottom: -100px; right: -50px; animation: drift2 32s ease-in-out infinite alternate; }
  @keyframes drift1 { to { transform: translate(120px, 80px) scale(1.1); } }
  @keyframes drift2 { to { transform: translate(-80px, -60px) scale(0.9); } }

  .maia-tag { display:inline-flex; align-items:center; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); font-family: var(--font-mono); font-size: 10px; color: #a1a1aa; text-transform: lowercase; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
</style>
</head>
<body>
<div class="aurora"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./Dock.jsx"></script>
<script type="text/babel" src="./Widgets.jsx"></script>
<script type="text/babel" src="./CommandPalette.jsx"></script>
<script type="text/babel" src="./Pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const seedNotes = [
  { id:1, title:"Journal — Apr 21", content:"Slept 7h. Read Gödel, Escher, Bach for 40m. Built dock component.", tags:["journal","today"] },
  { id:2, title:"Design system tokens", content:"Onest for prose, IBM Plex Mono for UI voice. Zinc neutrals, soft accents.", tags:["design","maia"] },
  { id:3, title:"Conexa v0.3 notes", content:"Force-directed graph with clustering by tag proximity.", tags:["conexa","graph"] },
  { id:4, title:"Chronos timeline", content:"Vertical ribbon showing past week with glyphs per day.", tags:["chronos"] },
  { id:5, title:"Letter to myself", content:"You build slowly because you build once. Keep the calm.", tags:["journal"] },
  { id:6, title:"Zen & the art of design systems", content:"A system is a conversation across time.", tags:["writing"] },
];

function App() {
  const [page, setPage] = useState("home");
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [entries, setEntries] = useState([
    { id: 'e1', time: '09:14', title: 'Morning thoughts on Maia.' },
    { id: 'e2', time: '11:02', title: 'Ship it before you perfect it.' },
  ]);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setPaletteOpen(v => !v); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const onCapture = (text) => {
    const now = new Date();
    const time = now.toTimeString().slice(0,5);
    setEntries(e => [{ id: 'e' + Date.now(), time, title: text }, ...e]);
  };

  const pageEl = {
    home: <HomePage entries={entries} onCapture={onCapture} now={new Date()}/>,
    opus: <OpusPage/>,
    codex: <CodexPage notes={seedNotes}/>,
    conexa: <ConexaPage/>,
    ledger: <LedgerPage/>,
  }[page] || <HomePage entries={entries} onCapture={onCapture} now={new Date()}/>;

  return (
    <div style={{position:"relative",zIndex:1,height:"100%",width:"100%"}}>
      {pageEl}
      <Dock page={page} setPage={setPage} onSearch={() => setPaletteOpen(true)}/>
      <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} onNavigate={setPage}/>
      {/* Cmd-K hint */}
      <div style={{position:"fixed",top:24,right:28,display:"flex",alignItems:"center",gap:8,zIndex:40,fontFamily:"var(--font-mono)",fontSize:10,color:"#71717a",textTransform:"uppercase",letterSpacing:".15em"}}>
        <kbd style={{padding:"3px 7px",borderRadius:6,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",fontFamily:"var(--font-mono)",fontSize:10,color:"#a1a1aa"}}>⌘K</kbd>
        <span>search</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
