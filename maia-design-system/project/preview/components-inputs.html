<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:260px;overflow:hidden;font-family:var(--font-sans)}
.wrap{padding:24px 28px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box}
.lbl{font-family:var(--font-sans);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#71717a;margin-bottom:4px}
input,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;color:#fafafa;font-family:var(--font-mono);font-size:14px;outline:none;box-sizing:border-box;resize:none}
input::placeholder,textarea::placeholder{color:#52525b}
input:focus,textarea:focus{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:0 14px}
.search input{background:none;border:none;padding:12px 0}
.kbd{font-family:var(--font-mono);font-size:10px;color:#71717a;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:2px 6px}
</style></head>
<body><div class="wrap">
<div><div class="lbl">INPUT · default</div><input value="Untitled note"/></div>
<div><div class="lbl">TEXTAREA · quick capture</div><textarea rows="2" placeholder="What's on your mind…"></textarea></div>
<div><div class="lbl">SEARCH · command palette</div>
  <div class="search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input placeholder="Type a command or search notes…"/>
    <span class="kbd">⌘K</span>
  </div>
</div>
</div></body></html>
