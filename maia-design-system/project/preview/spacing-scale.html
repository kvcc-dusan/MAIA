<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:220px;overflow:hidden;font-family:var(--font-mono)}
.wrap{padding:24px 28px;display:flex;flex-direction:column;gap:8px;height:100%;box-sizing:border-box}
.row{display:flex;align-items:center;gap:16px}
.n{font-size:11px;color:#a1a1aa;min-width:48px;font-weight:600}
.v{font-size:10px;color:#52525b;min-width:54px}
.bar{height:10px;background:#e4e4e7;border-radius:2px}
</style></head>
<body><div class="wrap">
<div class="row"><span class="n">xs</span><span class="v">4px</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="n">sm</span><span class="v">8px</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="n">md</span><span class="v">12px</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="n">lg</span><span class="v">16px</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="n">xl</span><span class="v">24px</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="n">2xl</span><span class="v">32px</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="n">3xl</span><span class="v">48px</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="n">4xl</span><span class="v">64px</span><div class="bar" style="width:64px"></div></div>
</div></body></html>
