<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Command Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:320px;overflow:hidden;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center}
.cp{width:560px;border-radius:24px;background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);box-shadow:0 25px 50px -12px rgba(0,0,0,.7);overflow:hidden}
.in{padding:16px;border-bottom:1px solid rgba(255,255,255,.05)}
.in input{width:100%;background:none;border:none;outline:none;padding:10px 14px;color:#fafafa;font-size:14px;font-family:var(--font-sans);font-weight:500}
.in input::placeholder{color:#52525b}
.list{padding:8px;display:flex;flex-direction:column;gap:4px}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;cursor:pointer;color:#a1a1aa;font-size:14px;transition:all 200ms ease-out}
.row.on{background:rgba(255,255,255,.1);color:#fafafa}
.lhs{display:flex;align-items:center;gap:12px}
.kind{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:700;color:#71717a;background:rgba(255,255,255,.05)}
.row.on .kind{background:#fafafa;color:#18181b}
.foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.4);display:flex;justify-content:space-between;font-family:var(--font-sans);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#52525b}
</style></head>
<body>
<div class="cp">
  <div class="in"><input placeholder="Type a command or search notes…"/></div>
  <div class="list">
    <div class="row on"><div class="lhs"><div class="kind">CMD</div>New Note</div></div>
    <div class="row"><div class="lhs"><div class="kind">CMD</div>Go to Conexa</div></div>
    <div class="row"><div class="lhs"><div class="kind">DOC</div>Journal — Apr 21</div><span style="font-size:10px;text-transform:uppercase;letter-spacing:.15em;opacity:.4;font-weight:500">Note</span></div>
  </div>
  <div class="foot"><span>Search, Navigate, Act</span><span>ESC to close</span></div>
</div>
</body></html>
