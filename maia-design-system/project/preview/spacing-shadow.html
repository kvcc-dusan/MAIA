<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Shadow & Glass Rim</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#050505;color:#e4e4e7;width:700px;height:240px;overflow:hidden;font-family:var(--font-mono)}
.wrap{padding:30px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;height:100%;box-sizing:border-box;align-items:center}
.box{height:130px;border-radius:20px;background:rgba(24,24,27,.4);border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(16px);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.b1{box-shadow:0 1px 2px 0 rgba(0,0,0,.3)}
.b2{box-shadow:0 10px 25px -5px rgba(0,0,0,.5),0 8px 10px -6px rgba(0,0,0,.3)}
.b3{box-shadow:0 1px 0 0 rgba(255,255,255,.1) inset,0 0 0 1px rgba(255,255,255,.05) inset,0 0 20px 0 rgba(0,0,0,.5),0 10px 20px -5px rgba(0,0,0,.8)}
.n{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#fafafa;font-weight:700}
.v{font-size:10px;color:#71717a;margin-top:4px}
</style></head>
<body><div class="wrap">
<div class="box b1"><span class="n">sm</span><span class="v">low elevation</span></div>
<div class="box b2"><span class="n">lg</span><span class="v">dock · cards</span></div>
<div class="box b3"><span class="n">glass rim</span><span class="v">signature</span></div>
</div></body></html>
