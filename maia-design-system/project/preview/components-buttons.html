<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:200px;overflow:hidden;font-family:var(--font-sans)}
.wrap{padding:30px;display:grid;grid-template-columns:repeat(4,auto);gap:14px 18px;align-content:center;justify-content:start;height:100%;box-sizing:border-box}
button{font-family:var(--font-sans);font-weight:500;font-size:14px;border:none;cursor:pointer;transition:all 200ms ease-out;height:36px;padding:0 16px;border-radius:8px;display:inline-flex;align-items:center;gap:6px}
.primary{background:#fafafa;color:#18181b}
.primary:hover{background:rgba(250,250,250,.9)}
.secondary{background:#26262a;color:#fafafa}
.outline{background:transparent;color:#fafafa;border:1px solid #26262a}
.ghost{background:transparent;color:#fafafa}
.ghost:hover{background:rgba(255,255,255,.05)}
.destructive{background:#7f1d1d;color:#fafafa}
.label-btn{font-family:var(--font-sans);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#a1a1aa;background:none;border:none;cursor:pointer;padding:0}
.label-btn.active{color:#fafafa}
.icon{width:36px;height:36px;padding:0;justify-content:center}
</style></head>
<body><div class="wrap">
<button class="primary">Capture</button>
<button class="secondary">Cancel</button>
<button class="outline">Outline</button>
<button class="ghost">Ghost</button>
<button class="destructive">Delete</button>
<button class="icon secondary">✕</button>
<button class="label-btn">MOMENTUM</button>
<button class="label-btn active">CAPTURE →</button>
</div></body></html>
