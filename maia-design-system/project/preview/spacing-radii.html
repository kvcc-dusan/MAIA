<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:200px;overflow:hidden;font-family:var(--font-mono)}
.wrap{padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;height:100%;box-sizing:border-box;align-items:center}
.item{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:58px;height:58px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)}
.n{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#a1a1aa;font-weight:700}
.v{font-size:10px;color:#52525b}
</style></head>
<body><div class="wrap">
<div class="item"><div class="box" style="border-radius:6px"></div><span class="n">sm</span><span class="v">6</span></div>
<div class="item"><div class="box" style="border-radius:8px"></div><span class="n">base</span><span class="v">8</span></div>
<div class="item"><div class="box" style="border-radius:12px"></div><span class="n">md</span><span class="v">12</span></div>
<div class="item"><div class="box" style="border-radius:16px"></div><span class="n">lg</span><span class="v">16</span></div>
<div class="item"><div class="box" style="border-radius:24px"></div><span class="n">2xl</span><span class="v">24 · card</span></div>
<div class="item"><div class="box" style="border-radius:9999px"></div><span class="n">pill</span><span class="v">∞</span></div>
</div></body></html>
