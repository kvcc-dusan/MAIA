<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Dock</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:180px;overflow:hidden;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center}
.dock{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:24px;background:rgba(24,24,27,.8);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);box-shadow:0 10px 25px -5px rgba(0,0,0,.5)}
.b{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;color:#71717a;cursor:pointer;transition:all 200ms ease-out}
.b:hover{background:rgba(255,255,255,.05);color:#fafafa}
.b.active{background:rgba(255,255,255,.1);color:#fafafa}
.sep{width:1px;height:28px;background:rgba(255,255,255,.1);margin:0 4px}
</style></head>
<body>
<div class="dock">
  <div class="b active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
  <div class="b"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v18M3 12h18M7 7l10 10M17 7 7 17"/></svg></div>
  <div class="b"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 6l4 14H4l4-14"/><path d="M8 6V4h8v2"/></svg></div>
  <div class="b"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg></div>
  <div class="b"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v18M3 6h18M6 6l-3 6h6zM18 6l3 6h-6z"/></svg></div>
  <div class="sep"></div>
  <div class="b"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg></div>
  <div class="b"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div>
</div>
</body></html>
