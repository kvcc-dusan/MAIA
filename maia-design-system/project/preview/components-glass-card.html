<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Maia — Glass Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:280px;overflow:hidden;font-family:var(--font-mono);position:relative}
.bg{position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,#10b98155 0%,transparent 35%),radial-gradient(circle at 70% 60%,#8b5cf644 0%,transparent 40%);filter:blur(50px)}
.wrap{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:24px;height:100%;box-sizing:border-box;align-items:center;z-index:1}
.card{border-radius:24px;border:1px solid rgba(255,255,255,.10);background:rgba(24,24,27,.40);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 10px 25px -5px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column}
.head{padding:16px 18px 0;display:flex;justify-content:space-between;align-items:center}
.lbl{font-family:var(--font-sans);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#71717a}
.body{padding:10px 18px 16px;display:flex;flex-direction:column;gap:6px}
.item{display:flex;gap:8px;align-items:center;font-family:var(--font-mono);font-size:12px;color:#e4e4e7}
.dot{width:6px;height:6px;border-radius:999px;background:#10B981;flex:none}
.foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.05);background:rgba(39,39,42,.2);padding:10px 18px;display:flex;justify-content:space-between}
.count{font-family:var(--font-mono);font-size:10px;color:#71717a}
</style></head>
<body><div class="bg"></div><div class="wrap">
<div class="card">
  <div class="head"><span class="lbl">TODAY'S FOCUS</span><span class="count">3 tasks</span></div>
  <div class="body">
    <div class="item"><span class="dot"></span>Draft design system README</div>
    <div class="item"><span class="dot" style="background:#F59E0B"></span>Review Conexa graph</div>
    <div class="item"><span class="dot" style="background:#8B5CF6"></span>Ship Chronos v2</div>
  </div>
  <div class="foot"><span class="lbl">MOMENTUM</span></div>
</div>
<div class="card">
  <div class="head"><span class="lbl">QUICK CAPTURE</span><span class="count">2 today</span></div>
  <div class="body">
    <div style="font-family:var(--font-mono);font-size:13px;color:#52525b;line-height:1.6">What's on your mind…</div>
  </div>
  <div class="foot"><span class="lbl">ENTRIES</span><span class="lbl" style="color:#fafafa">CAPTURE →</span></div>
</div>
</div></body></html>
