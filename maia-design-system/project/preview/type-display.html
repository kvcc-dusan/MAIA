<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maia — Type: Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:260px;overflow:hidden}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box}
  .row{display:flex;align-items:baseline;gap:16px}
  .lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#52525b;font-weight:700;min-width:120px}
  .specimen{font-family:var(--font-sans);color:#fafafa}
  .h1{font-size:56px;font-weight:600;letter-spacing:-.02em;line-height:1}
  .h2{font-size:40px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
  .h3{font-size:28px;font-weight:600;line-height:1.2}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="lbl">Display 56 / 600</span><span class="specimen h1">Good morning.</span></div>
  <div class="row"><span class="lbl">Heading 40 / 600</span><span class="specimen h2">Today's Focus</span></div>
  <div class="row"><span class="lbl">Subhead 28 / 600</span><span class="specimen h3">A calm knowledge OS</span></div>
  <div class="row"><span class="lbl">Onest · —.02em</span><span style="font-family:var(--font-mono);font-size:11px;color:#71717a">Sans · Google Fonts</span></div>
</div>
</body>
</html>
