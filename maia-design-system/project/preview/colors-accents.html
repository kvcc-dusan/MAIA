<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maia — Semantic Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:220px;overflow:hidden;font-family:var(--font-mono)}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:10px;height:100%;box-sizing:border-box}
  .row{display:flex;align-items:center;gap:14px}
  .dot{width:14px;height:14px;border-radius:999px;flex:none}
  .name{font-size:12px;font-weight:600;min-width:90px;color:#fafafa}
  .hex{font-size:11px;color:#71717a;min-width:80px;font-family:var(--font-mono)}
  .role{font-size:10px;text-transform:uppercase;letter-spacing:.15em;font-weight:700;min-width:150px}
  .use{font-size:11px;color:#a1a1aa}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="dot" style="background:#10B981"></span><span class="name">Emerald</span><span class="hex">#10B981</span><span class="role" style="color:#10B981">ACTIVE · GROWTH</span><span class="use">tags, toast dots, velocity+</span></div>
  <div class="row"><span class="dot" style="background:#F59E0B"></span><span class="name">Amber</span><span class="hex">#F59E0B</span><span class="role" style="color:#F59E0B">ATTENTION</span><span class="use">highlight, warnings</span></div>
  <div class="row"><span class="dot" style="background:#F43F5E"></span><span class="name">Rose</span><span class="hex">#F43F5E</span><span class="role" style="color:#F43F5E">CRITICAL</span><span class="use">errors, delete, code</span></div>
  <div class="row"><span class="dot" style="background:#0EA5E9"></span><span class="name">Sky</span><span class="hex">#0EA5E9</span><span class="role" style="color:#0EA5E9">CONNECTION</span><span class="use">links, references</span></div>
  <div class="row"><span class="dot" style="background:#8B5CF6"></span><span class="name">Violet</span><span class="hex">#8B5CF6</span><span class="role" style="color:#8B5CF6">INTELLIGENCE</span><span class="use">AI, blockquote border</span></div>
</div>
</body>
</html>
