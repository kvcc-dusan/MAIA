<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maia — Type: Signature Label</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:200px;overflow:hidden;font-family:var(--font-mono)}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:18px;height:100%;box-sizing:border-box}
  .lbl{font-family:var(--font-sans);font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#71717a}
  .xl{font-size:18px}
  .md{font-size:12px}
  .sm{font-size:10px}
  .note{font-family:var(--font-mono);font-size:11px;color:#52525b}
  .row{display:flex;align-items:center;gap:20px}
  .active{color:#fafafa}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="lbl xl">TODAY'S FOCUS</span><span class="note">18 / 700 / .15em · title</span></div>
  <div class="row"><span class="lbl md">MOMENTUM</span><span class="note">12 / 700 / .15em · footer toggle</span></div>
  <div class="row"><span class="lbl sm">ENTRIES</span><span class="note">10 / 700 / .15em · micro-label</span></div>
  <div class="row"><span class="lbl sm active">CAPTURE →</span><span class="note">active = white</span></div>
</div>
</body>
</html>
