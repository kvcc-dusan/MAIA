<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maia — Type: Body & Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;color:#e4e4e7;width:700px;height:260px;overflow:hidden}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:1fr 1fr;gap:28px;height:100%;box-sizing:border-box}
  .col{display:flex;flex-direction:column;gap:10px}
  .lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#52525b;font-weight:700}
  .body{font-family:var(--font-sans);font-size:16px;line-height:1.75;color:#e4e4e7}
  .mono{font-family:var(--font-mono);font-size:14px;line-height:1.5;color:#e4e4e7}
  .caption{font-family:var(--font-mono);font-size:12px;color:#71717a}
  .foot{font-family:var(--font-mono);font-size:10px;color:#71717a;margin-top:auto}
</style>
</head>
<body>
<div class="wrap">
  <div class="col">
    <div class="lbl">Body · Onest 16 / 1.75</div>
    <div class="body">A second brain that moves at the speed of thought.</div>
    <div class="caption">caption · mono 12 · zinc-500</div>
    <div class="foot">— prose uses sans for reading</div>
  </div>
  <div class="col">
    <div class="lbl">Mono · IBM Plex 14 / 1.5</div>
    <div class="mono">chronos.open({ task: "0004" })</div>
    <div class="mono" style="color:#a1a1aa">// default body font in UI</div>
    <div class="foot">— mono is the dashboard voice</div>
  </div>
</div>
</body>
</html>
